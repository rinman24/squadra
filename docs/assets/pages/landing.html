document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"79e79067-3b2c-465e-b9da-66bb44032ccc\">\n<link rel=\"icon\" type=\"image/png\" sizes=\"16x16\" href=\"7fdd2613-8133-4d13-8afc-3af183b94025\">\n<link rel=\"apple-touch-icon\" sizes=\"180x180\" href=\"45c57992-6c11-40de-b681-8e6aa5e13d84\">\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body { background: #FBF8F6; }\n  @keyframes sq-reveal { 0%, 8% { opacity: 1; } 44%, 92% { opacity: 0; } 100% { opacity: 1; } }\n  @keyframes sq-blink { 0%, 60% { opacity: 1; } 80%, 100% { opacity: 0.25; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"background:#FBF8F6; color:#2A1820; font-family:'Hanken Grotesk', system-ui, sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden;\">\n\n  <!-- ===== NAV ===== -->\n  <nav style=\"position:sticky; top:0; z-index:50; background:rgba(251,248,246,0.82); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-bottom:1px solid rgba(42,24,32,0.08);\">\n    <div style=\"max-width:1140px; margin:0 auto; padding:14px 32px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <svg viewBox=\"2 11 64 42\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:28px; height:auto;\"><polygon points=\"7,48 14,48 22,16 15,16\" fill=\"#2A1820\"><\u002Fpolygon><polygon points=\"20,48 27,48 35,16 28,16\" fill=\"#2A1820\"><\u002Fpolygon><polygon points=\"33,48 40,48 48,16 41,16\" fill=\"#E23E7B\"><\u002Fpolygon><polygon points=\"46,48 53,48 61,16 54,16\" fill=\"#F7913D\"><\u002Fpolygon><\u002Fsvg>\n        <span style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; letter-spacing:-0.01em;\">squadra<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:26px; font-size:14px;\">\n        <a href=\"#how\" style=\"color:#5C474D; text-decoration:none;\" style-hover=\"color:#2A1820;\">How it works<\u002Fa>\n        <a href=\"#features\" style=\"color:#5C474D; text-decoration:none;\" style-hover=\"color:#2A1820;\">Features<\u002Fa>\n        <a href=\"#install\" style=\"color:#5C474D; text-decoration:none;\" style-hover=\"color:#2A1820;\">Install<\u002Fa>\n        <a href=\"https://github.com/rinman24/squadra\" style=\"color:#5C474D; text-decoration:none; font-family:'JetBrains Mono',monospace; font-size:12.5px;\">GitHub ↗<\u002Fa>\n        <a href=\"#install\" style=\"background:#E23E7B; color:#fff; text-decoration:none; font-weight:600; font-size:13.5px; padding:9px 16px; border-radius:9px;\" style-hover=\"background:#B41E5C;\">Get started<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ===== HERO ===== -->\n  <header data-screen-label=\"Hero\" style=\"max-width:1140px; margin:0 auto; padding:72px 32px 56px;\">\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(330px,1fr)); gap:48px; align-items:center;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#E23E7B; margin-bottom:20px;\">AFK · board-driven · deterministic<\u002Fdiv>\n        <h1 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(40px,5.6vw,62px); line-height:1.0; letter-spacing:-0.035em; margin:0;\">Ships every slice.<br><span style=\"color:#E23E7B;\">Unattended.<\u002Fspan><\u002Fh1>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:18px; line-height:1.55; color:#5C474D; max-width:50ch; margin:24px 0 0;\">A deterministic supervisor driving a fleet of Claude runners across every vertical slice — hands-off, with the board as the single source of truth.<\u002Fp>\n        <div style=\"display:flex; gap:12px; flex-wrap:wrap; margin-top:32px;\">\n          <a href=\"#install\" style=\"background:#E23E7B; color:#fff; text-decoration:none; font-weight:600; font-size:15px; padding:14px 24px; border-radius:11px;\" style-hover=\"background:#B41E5C;\">Get started<\u002Fa>\n          <a href=\"https://github.com/rinman24/squadra\" style=\"background:transparent; color:#2A1820; text-decoration:none; font-weight:600; font-size:15px; padding:14px 22px; border-radius:11px; border:1px solid rgba(42,24,32,0.18);\" style-hover=\"background:#F4EDE9;\">Read the docs<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:inline-flex; align-items:center; gap:12px; margin-top:24px; background:#211218; border-radius:10px; padding:11px 16px; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:#FBF8F6;\">\n          <span style=\"color:#8C7B76;\">$<\u002Fspan><span>uv pip install squadra<\u002Fspan><span style=\"color:#8C7B76; margin-left:4px;\">⧉<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Hero terminal -->\n      <div style=\"border-radius:14px; overflow:hidden; box-shadow:0 24px 54px rgba(42,24,32,0.2); border:1px solid rgba(42,24,32,0.16);\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:12px 16px; background:#1B0F14;\">\n          <span style=\"width:11px; height:11px; border-radius:50%; background:rgba(251,248,246,0.22);\"><\u002Fspan>\n          <span style=\"width:11px; height:11px; border-radius:50%; background:rgba(251,248,246,0.22);\"><\u002Fspan>\n          <span style=\"width:11px; height:11px; border-radius:50%; background:rgba(251,248,246,0.22);\"><\u002Fspan>\n          <span style=\"flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(251,248,246,0.5);\">squadra status<\u002Fspan>\n          <span style=\"display:inline-flex; gap:3px;\">\n            <span style=\"position:relative; width:6px; height:16px; background:#fff; transform:skewX(-14deg); border-radius:1px; overflow:hidden;\"><span style=\"position:absolute; inset:0; background:#1B0F14; animation:sq-reveal 2600ms ease-out infinite; animation-delay:0ms;\"><\u002Fspan><\u002Fspan>\n            <span style=\"position:relative; width:6px; height:16px; background:#fff; transform:skewX(-14deg); border-radius:1px; overflow:hidden;\"><span style=\"position:absolute; inset:0; background:#1B0F14; animation:sq-reveal 2600ms ease-out infinite; animation-delay:150ms;\"><\u002Fspan><\u002Fspan>\n            <span style=\"position:relative; width:6px; height:16px; background:#F7913D; transform:skewX(-14deg); border-radius:1px; overflow:hidden;\"><span style=\"position:absolute; inset:0; background:#1B0F14; animation:sq-reveal 2600ms ease-out infinite; animation-delay:300ms;\"><\u002Fspan><\u002Fspan>\n            <span style=\"position:relative; width:6px; height:16px; background:#E23E7B; transform:skewX(-14deg); border-radius:1px; overflow:hidden;\"><span style=\"position:absolute; inset:0; background:#1B0F14; animation:sq-reveal 2600ms ease-out infinite; animation-delay:450ms;\"><\u002Fspan><\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background:#211218; padding:20px 22px; font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:1.7; color:#E5D9D4;\">\n          <div><span style=\"color:#F7913D;\">$<\u002Fspan> squadra status<\u002Fdiv>\n          <div style=\"margin-top:7px;\"><span style=\"color:#E23E7B;\">●<\u002Fspan> fleet-ticker <span style=\"color:#FBF8F6;\">running<\u002Fspan> <span style=\"color:#8C7B76;\">· 2/2 runners<\u002Fspan><\u002Fdiv>\n          <div style=\"height:12px;\"><\u002Fdiv>\n          <div style=\"display:flex;\"><span style=\"width:50px; color:#8C7B76;\">#41<\u002Fspan><span style=\"width:172px; color:#FBF8F6;\">board-provider seam<\u002Fspan><span style=\"color:#E23E7B;\">● active<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;\"><span style=\"width:50px; color:#8C7B76;\">#44<\u002Fspan><span style=\"width:172px; color:#FBF8F6;\">git hardening<\u002Fspan><span style=\"color:#E23E7B;\">● active<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;\"><span style=\"width:50px; color:#8C7B76;\">#38<\u002Fspan><span style=\"width:172px; color:#FBF8F6;\">scaffold init<\u002Fspan><span style=\"color:#F7913D;\">● done<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;\"><span style=\"width:50px; color:#8C7B76;\">#52<\u002Fspan><span style=\"width:172px; color:#FBF8F6;\">adapter tests<\u002Fspan><span style=\"color:#8C7B76;\">● queued<\u002Fspan><\u002Fdiv>\n          <div style=\"height:12px;\"><\u002Fdiv>\n          <div style=\"color:#8C7B76;\">last tick 12s ago · next in 168s<span style=\"animation:sq-blink 1.1s steps(1) infinite;\">▋<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- provider strip -->\n    <div style=\"display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-top:52px; padding-top:26px; border-top:1px solid rgba(42,24,32,0.1);\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#8C7B76;\">Boards<\u002Fspan>\n      <span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:15px; color:#2A1820;\">Azure DevOps <span style=\"font-weight:400; color:#8C7B76; font-size:13px;\">ships today<\u002Fspan><\u002Fspan>\n      <span style=\"color:#D6C9C4;\">·<\u002Fspan>\n      <span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:15px; color:#8C7B76;\">GitHub<\u002Fspan>\n      <span style=\"color:#D6C9C4;\">·<\u002Fspan>\n      <span style=\"font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:15px; color:#8C7B76;\">GitLab<\u002Fspan>\n      <span style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:#8C7B76;\">on the roadmap — one provider-neutral contract.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HOW IT WORKS ===== -->\n  <section id=\"how\" data-screen-label=\"How it works\" style=\"max-width:1140px; margin:0 auto; padding:64px 32px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#E23E7B; margin-bottom:10px;\">How it works<\u002Fdiv>\n    <h2 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(28px,3.6vw,38px); letter-spacing:-0.025em; margin:0 0 8px; max-width:18ch;\">One deterministic tick, three ordered passes.<\u002Fh2>\n    <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:16px; color:#5C474D; max-width:60ch; margin:0 0 36px;\">Every fleet process is stateless and reconstructs its view from the board on each run. No hidden state, no hung sessions.<\u002Fp>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:18px;\">\n      <div style=\"border:1px solid rgba(42,24,32,0.1); border-radius:16px; background:#fff; padding:26px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#8C7B76;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#8C7B76;\">01 · queued → active<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:19px; margin:0 0 8px; letter-spacing:-0.01em;\">Claim<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.55; color:#5C474D; margin:0;\">The supervisor claims unblocked slices off the board, lowest id first, and derives a deterministic branch per slice.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(42,24,32,0.1); border-radius:16px; background:#fff; padding:26px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#E23E7B;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#8C7B76;\">02 · active<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:19px; margin:0 0 8px; letter-spacing:-0.01em;\">Run<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.55; color:#5C474D; margin:0;\">Each slice gets a sandboxed Claude runner in its own worktree, driving tdd → qa. Container lifecycle is the agent lifecycle.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(42,24,32,0.1); border-radius:16px; background:#fff; padding:26px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\"><span style=\"width:10px; height:10px; border-radius:3px; background:#F7913D;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#8C7B76;\">03 · done<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:19px; margin:0 0 8px; letter-spacing:-0.01em;\">Finalize<\u002Fh3>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:14px; line-height:1.55; color:#5C474D; margin:0;\">Merged PRs retire the slice and clean up its branch. A watchdog reaps dead runners and retries — crash-only by design.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FEATURES ===== -->\n  <section id=\"features\" data-screen-label=\"Features\" style=\"max-width:1140px; margin:0 auto; padding:8px 32px 64px;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#E23E7B; margin-bottom:10px;\">Features<\u002Fdiv>\n    <h2 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(28px,3.6vw,38px); letter-spacing:-0.025em; margin:0 0 36px; max-width:20ch;\">Security-grade automation you can leave running.<\u002Fh2>\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:1px; background:rgba(42,24,32,0.1); border:1px solid rgba(42,24,32,0.1); border-radius:16px; overflow:hidden;\">\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#E23E7B; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Deterministic supervisor<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">A token-free tick with no LLM in the loop — it can't hallucinate a board mutation, and it's unit-tested against in-memory fakes.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#F7913D; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Board is the source of truth<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">Work-item state drives everything at every tier. Parked slices are queryable board state — never a hung session.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#2A1820; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Provider-neutral<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">A neutral 3-bucket lifecycle maps to any board at the boundary. ADO ships today; GitHub and GitLab share the contract.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#E23E7B; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Sandboxed runners<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">Each slice runs in its own ephemeral Docker project with host-side git hardening against sandbox escape.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#F7913D; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Crash-only &amp; stateless<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">Every process is short-lived and reconstructs from the board, so a restarted ticker resumes cleanly.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff; padding:28px;\"><span style=\"display:inline-block; width:30px; height:13px; background:#2A1820; transform:skewX(-14deg); border-radius:2px; margin-bottom:16px;\"><\u002Fspan><h3 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:18px; margin:0 0 7px; letter-spacing:-0.01em;\">Dry-run first<\u002Fh3><p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; line-height:1.55; color:#5C474D; margin:0;\">Plan the full finalize / reap / claim logic and log every action it would take — with every side effect suppressed.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== INSTALL ===== -->\n  <section id=\"install\" data-screen-label=\"Install\" style=\"background:#2A1820; color:#FBF8F6;\">\n    <div style=\"max-width:1140px; margin:0 auto; padding:72px 32px; display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:44px; align-items:center;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#F7913D; margin-bottom:14px;\">Quickstart<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(28px,3.6vw,40px); letter-spacing:-0.03em; margin:0 0 16px; line-height:1.05;\">Up and running in three commands.<\u002Fh2>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:16px; line-height:1.6; color:rgba(251,248,246,0.74); max-width:46ch; margin:0;\">No third-party runtime dependencies — pure standard library. You bring <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#FBF8F6;\">tmux<\u002Fspan>, <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#FBF8F6;\">git<\u002Fspan>, your board CLI, and <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#FBF8F6;\">claude<\u002Fspan>.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border-radius:14px; overflow:hidden; border:1px solid rgba(251,248,246,0.14); background:#1B0F14;\">\n        <div style=\"padding:22px 24px; font-family:'JetBrains Mono',monospace; font-size:13.5px; line-height:2.0; color:#E5D9D4;\">\n          <div><span style=\"color:#8C7B76;\"># install<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:#F7913D;\">$<\u002Fspan> uv pip install squadra<\u002Fdiv>\n          <div style=\"height:8px;\"><\u002Fdiv>\n          <div><span style=\"color:#8C7B76;\"># scaffold an annotated config<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:#F7913D;\">$<\u002Fspan> squadra init <span style=\"color:#E23E7B;\">--provider<\u002Fspan> ado<\u002Fdiv>\n          <div style=\"height:8px;\"><\u002Fdiv>\n          <div><span style=\"color:#8C7B76;\"># plan a tick, mutate nothing<\u002Fspan><\u002Fdiv>\n          <div><span style=\"color:#F7913D;\">$<\u002Fspan> squadra tick <span style=\"color:#E23E7B;\">--dry-run<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CTA ===== -->\n  <section style=\"max-width:1140px; margin:0 auto; padding:72px 32px; text-align:center;\">\n    <h2 style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:clamp(32px,5vw,56px); letter-spacing:-0.035em; margin:0; line-height:1.0;\">Run your fleet <span style=\"color:#E23E7B;\">AFK.<\u002Fspan><\u002Fh2>\n    <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:17px; color:#5C474D; max-width:48ch; margin:18px auto 30px;\">Point it at a board, scope the claims, and let the supervisor ship slice after slice.<\u002Fp>\n    <div style=\"display:flex; gap:12px; justify-content:center; flex-wrap:wrap;\">\n      <a href=\"https://github.com/rinman24/squadra\" style=\"background:#E23E7B; color:#fff; text-decoration:none; font-weight:600; font-size:15px; padding:14px 26px; border-radius:11px;\" style-hover=\"background:#B41E5C;\">Get started<\u002Fa>\n      <a href=\"https://github.com/rinman24/squadra\" style=\"background:transparent; color:#2A1820; text-decoration:none; font-weight:600; font-size:15px; padding:14px 24px; border-radius:11px; border:1px solid rgba(42,24,32,0.18);\" style-hover=\"background:#F4EDE9;\">★ Star on GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#2A1820; color:#FBF8F6;\">\n    <div style=\"max-width:1140px; margin:0 auto; padding:48px 32px; display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:30px;\">\n      <div style=\"min-width:200px;\">\n        <div style=\"display:flex; align-items:center; gap:10px;\"><svg viewBox=\"2 11 64 42\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:26px; height:auto;\"><polygon points=\"7,48 14,48 22,16 15,16\" fill=\"#FFFFFF\"><\u002Fpolygon><polygon points=\"20,48 27,48 35,16 28,16\" fill=\"#FFFFFF\"><\u002Fpolygon><polygon points=\"33,48 40,48 48,16 41,16\" fill=\"#F7913D\"><\u002Fpolygon><polygon points=\"46,48 53,48 61,16 54,16\" fill=\"#E23E7B\"><\u002Fpolygon><\u002Fsvg><span style=\"font-family:'Poppins',sans-serif; font-weight:600; font-size:17px;\">squadra<\u002Fspan><\u002Fdiv>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; color:rgba(251,248,246,0.6); line-height:1.55; margin:14px 0 0; max-width:30ch;\">An unattended, board-driven Claude delivery fleet. MIT licensed.<\u002Fp>\n      <\u002Fdiv>\n      <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(251,248,246,0.45); margin-bottom:12px;\">Product<\u002Fdiv><div style=\"display:flex; flex-direction:column; gap:9px; font-family:'Hanken Grotesk',sans-serif; font-size:14px;\"><a href=\"#how\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">How it works<\u002Fa><a href=\"#features\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">Features<\u002Fa><a href=\"#install\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">Install<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(251,248,246,0.45); margin-bottom:12px;\">Project<\u002Fdiv><div style=\"display:flex; flex-direction:column; gap:9px; font-family:'Hanken Grotesk',sans-serif; font-size:14px;\"><a href=\"https://github.com/rinman24/squadra\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">GitHub<\u002Fa><a href=\"https://pypi.org/project/squadra/\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">PyPI<\u002Fa><a href=\"https://github.com/rinman24/squadra\" style=\"color:rgba(251,248,246,0.82); text-decoration:none;\">ADRs<\u002Fa><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:rgba(251,248,246,0.45); margin-bottom:12px;\">Fleet<\u002Fdiv><div style=\"display:flex; gap:6px; margin-top:2px;\"><span style=\"width:13px; height:38px; background:#fff; transform:skewX(-14deg); display:inline-block; border-radius:2px;\"><\u002Fspan><span style=\"width:13px; height:38px; background:#fff; transform:skewX(-14deg); display:inline-block; border-radius:2px;\"><\u002Fspan><span style=\"width:13px; height:38px; background:#F7913D; transform:skewX(-14deg); display:inline-block; border-radius:2px;\"><\u002Fspan><span style=\"width:13px; height:38px; background:#E23E7B; transform:skewX(-14deg); display:inline-block; border-radius:2px;\"><\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(251,248,246,0.12);\"><div style=\"max-width:1140px; margin:0 auto; padding:18px 32px; font-family:'JetBrains Mono',monospace; font-size:11.5px; color:rgba(251,248,246,0.45); display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;\"><span>github.com/rinman24/squadra<\u002Fspan><span>squadra · 2026 · MIT<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
