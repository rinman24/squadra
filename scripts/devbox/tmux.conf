# squadra devbox tmux config — symlinked to /home/dev/.tmux.conf in the dev image.
# The symlink target resolves at runtime via the /workspace bind mount, so
# edits here apply on the next tmux server start (all sessions ended / `tmux kill-server`)
# with no image rebuild.
set -g mouse on            # click windows/panes, wheel scrollback, drag-select
set -s set-clipboard on    # OSC 52: copied text -> local clipboard through ssh
set -g history-limit 50000 # deep scrollback
