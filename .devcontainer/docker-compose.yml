# flotilla dev container — a SECOND compose stack on the shared devbox Docker
# daemon, fully independent of app's stack (its own image, its own volume, no DB, no
# ports, no shared services). Container-scoped only: nothing here touches the VM.
#
# `name: flotilla` pins the compose project name. It MUST match `-p flotilla` in
# scripts/devbox/* and the project name VS Code uses, or "Reopen in Container" and the
# host scripts would spawn two separate stacks. With the project name fixed, app's
# stack (project `devcontainer`) and flotilla's never collide on the same daemon.
name: flotilla

services:
  flotilla:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      # The repo bind mount. The in-repo `.venv` is created here at runtime by
      # `uv sync` (postCreateCommand / scripts/devbox/up.sh) — not baked into the image.
      - ..:/workspaces/flotilla:cached
      # Persist Claude Code auth + auto-memory across rebuilds, isolated from app's
      # `claude_home` volume (own memory, no `.claude.json` contention). First recreate
      # brings this up EMPTY — re-auth once inside the container.
      - flotilla_claude_home:/home/dev/.claude
    command: sleep infinity
    environment:
      # Optional PAT so a `git push` to the ADO origin works from inside the container
      # (the repo-local credential helper reads $AZURE_DEVOPS_EXT_PAT). Leave unset to
      # skip; empty string here is harmless. Phase 2 swaps this for `gh auth login`.
      AZURE_DEVOPS_EXT_PAT: ${AZURE_DEVOPS_EXT_PAT:-}

volumes:
  flotilla_claude_home:
