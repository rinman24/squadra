# flotilla CI — lint + strict type-check + tests on every PR into main.
#
# Fully self-contained: no secrets, no services. uv provisions Python 3.11
# (per .python-version) and the dev tools from the locked uv.lock; the hermetic
# shell tests need only bash (present on ubuntu-latest) and run against a
# stubbed `claude` with no network/ADO/tmux.
trigger: none          # no CI build on push
pr:
  branches:
    include:
      - main           # only run when the PR targets main

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: CI
  displayName: 'Lint + Typecheck + Test (uv)'
  timeoutInMinutes: 20

  steps:
    - checkout: self
      clean: true

    - script: |
        set -euo pipefail
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "##vso[task.prependpath]$HOME/.local/bin"
      displayName: Install uv

    - script: |
        set -euo pipefail
        uv sync --frozen
      displayName: uv sync (locked deps + project)

    - script: |
        set -euo pipefail
        uv run ruff check .
      displayName: Ruff (lint)

    - script: |
        set -euo pipefail
        uv run pyright
      displayName: Pyright (strict)

    - script: |
        set -euo pipefail
        uv run pytest
      displayName: Pytest (unit + hermetic shell tests)
